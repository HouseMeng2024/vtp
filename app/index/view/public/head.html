<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{$page_title|htmlentities}</title>
    <meta name="keywords" content="{$page_keywords|default=''|htmlentities}">
    <meta name="description" content="{$page_description|default=''|htmlentities}">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #f6f7fb; color: #1f2937; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        a { color: inherit; text-decoration: none; }
        .container { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
        .site-header { position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e5e7eb; background: rgba(255, 255, 255, .94); backdrop-filter: blur(10px); }
        .site-nav { display: flex; min-height: 64px; align-items: center; justify-content: space-between; gap: 24px; }
        .site-brand { display: flex; align-items: center; gap: 10px; color: #111827; font-weight: 700; }
        .brand-logo { width: 34px; height: 34px; border-radius: 8px; object-fit: cover; background: #2563eb; }
        .brand-placeholder { display: inline-flex; align-items: center; justify-content: center; color: #fff; }
        .nav-links { display: flex; flex-wrap: wrap; gap: 6px; color: #4b5563; font-size: 14px; }
        .nav-item { position: relative; }
        .nav-link { display: inline-flex; min-height: 36px; align-items: center; padding: 0 10px; border-radius: 6px; }
        .nav-item:hover .nav-link { background: #eff6ff; color: #2563eb; }
        .nav-dropdown { position: absolute; top: 100%; left: 0; display: none; min-width: 150px; padding: 6px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; box-shadow: 0 16px 36px rgba(15, 23, 42, .12); }
        .nav-dropdown a { display: block; padding: 9px 10px; border-radius: 6px; white-space: nowrap; }
        .nav-dropdown a:hover { background: #eff6ff; color: #2563eb; }
        .nav-item:hover .nav-dropdown { display: block; }
        .page-head { padding: 34px 0 20px; }
        .page-title { margin: 0; color: #111827; font-size: 30px; }
        .section { padding: 24px 0 42px; }
        .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .section-title { margin: 0; color: #111827; font-size: 24px; }
        .more { color: #2563eb; font-size: 14px; }
        .empty { padding: 40px 0; color: #9ca3af; text-align: center; }
        .site-footer { padding: 28px 0; border-top: 1px solid #e5e7eb; color: #6b7280; font-size: 14px; }
        .hero { padding: 42px 0 28px; }
        .hero-slider { position: relative; overflow: hidden; border: 1px solid #e5e7eb; border-radius: 14px; background: #fff; box-shadow: 0 20px 60px rgba(15, 23, 42, .08); }
        .hero-track { display: flex; transition: transform .42s ease; will-change: transform; }
        .hero-slide { min-width: 100%; }
        .hero-card { display: grid; min-height: 360px; overflow: hidden; grid-template-columns: 1.1fr .9fr; background: #fff; }
        .hero-copy { display: flex; flex-direction: column; justify-content: center; padding: 48px; }
        .eyebrow { margin: 0 0 12px; color: #2563eb; font-size: 14px; font-weight: 600; }
        .hero-title { margin: 0; color: #111827; font-size: 40px; line-height: 1.18; }
        .hero-desc { margin: 18px 0 0; color: #6b7280; font-size: 16px; line-height: 1.8; }
        .hero-image { width: 100%; height: 100%; min-height: 320px; object-fit: cover; }
        .hero-arrow { position: absolute; bottom: 18px; display: inline-flex; width: 38px; height: 38px; align-items: center; justify-content: center; color: #111827; cursor: pointer; background: rgba(255, 255, 255, .9); border: 1px solid #e5e7eb; border-radius: 999px; box-shadow: 0 10px 24px rgba(15, 23, 42, .12); }
        .hero-arrow:hover { background: #fff; }
        .hero-prev { left: 24px; }
        .hero-next { left: 70px; }
        .hero-dots { position: absolute; right: 24px; bottom: 18px; display: flex; gap: 8px; }
        .hero-dot { width: 8px; height: 8px; padding: 0; cursor: pointer; background: rgba(255, 255, 255, .7); border: 1px solid rgba(17, 24, 39, .14); border-radius: 999px; }
        .hero-dot.active { width: 24px; background: #2563eb; border-color: #2563eb; }
        .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
        .article-card { overflow: hidden; border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; }
        .article-cover { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; background: #e5e7eb; }
        .article-body { padding: 16px; }
        .article-title { margin: 0; color: #111827; font-size: 17px; line-height: 1.5; }
        .article-summary { display: -webkit-box; min-height: 48px; margin: 10px 0 0; overflow: hidden; color: #6b7280; font-size: 14px; line-height: 1.7; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .article-meta { margin-top: 14px; color: #9ca3af; font-size: 13px; }
        .category-list { display: flex; flex-wrap: wrap; gap: 10px; }
        .category-pill { display: inline-flex; align-items: center; min-height: 36px; padding: 0 14px; border: 1px solid #dbeafe; border-radius: 999px; background: #eff6ff; color: #2563eb; font-size: 14px; }
        .article-layout { display: grid; grid-template-columns: 220px 1fr; gap: 20px; padding-bottom: 48px; }
        .article-side, .article-list, .detail-card { border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; }
        .article-side { align-self: start; padding: 14px; }
        .side-title { margin: 0 0 10px; color: #111827; font-size: 16px; }
        .side-link { display: block; padding: 9px 10px; border-radius: 6px; color: #4b5563; font-size: 14px; }
        .side-link:hover { background: #eff6ff; color: #2563eb; }
        .list-item { display: grid; grid-template-columns: 180px 1fr; gap: 18px; padding: 18px; border-bottom: 1px solid #eef2f7; }
        .list-item:last-child { border-bottom: 0; }
        .list-cover { width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; object-fit: cover; background: #e5e7eb; }
        .list-title { margin: 0; color: #111827; font-size: 20px; line-height: 1.45; }
        .list-summary { display: -webkit-box; margin: 10px 0 0; overflow: hidden; color: #6b7280; font-size: 14px; line-height: 1.8; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .list-meta { margin-top: 12px; color: #9ca3af; font-size: 13px; }
        .detail-card { margin: 28px auto 48px; overflow: hidden; }
        .detail-cover { width: 100%; max-height: 420px; object-fit: cover; background: #e5e7eb; }
        .detail-body { padding: 36px; }
        .detail-title { margin: 0; color: #111827; font-size: 34px; line-height: 1.3; }
        .detail-summary { margin: 16px 0 0; color: #6b7280; font-size: 16px; line-height: 1.8; }
        .detail-meta { margin-top: 16px; color: #9ca3af; font-size: 14px; }
        .detail-content { margin-top: 30px; color: #374151; font-size: 16px; line-height: 1.9; }
        .detail-content img { max-width: 100%; height: auto; border-radius: 10px; }
        .detail-content p { margin: 0 0 18px; }
        .back { display: inline-flex; margin-top: 26px; color: #2563eb; font-size: 14px; }
        @media (max-width: 820px) {
            .site-nav { align-items: flex-start; flex-direction: column; padding: 14px 0; }
            .nav-links { width: 100%; gap: 4px 8px; }
            .nav-dropdown { position: static; display: block; width: 100%; margin-top: 2px; padding: 0 0 0 12px; border: 0; background: transparent; box-shadow: none; }
            .nav-dropdown a { padding: 7px 10px; color: #6b7280; }
            .hero-card { grid-template-columns: 1fr; }
            .hero-copy { padding: 28px; }
            .hero-title { font-size: 30px; }
            .hero-arrow { display: none; }
            .hero-dots { right: 16px; bottom: 14px; }
            .grid, .article-layout, .list-item { grid-template-columns: 1fr; }
            .detail-body { padding: 24px; }
            .detail-title { font-size: 26px; }
        }
    </style>
</head>
<body>
