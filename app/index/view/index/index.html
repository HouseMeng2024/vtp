<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{$config.page_title|htmlentities}</title>
    <meta name="keywords" content="{$config.seo_keywords|default=''|htmlentities}">
    <meta name="description" content="{$config.seo_description|default=''|htmlentities}">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f7fb;
            color: #1f2937;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .site {
            width: min(720px, 100%);
            text-align: center;
        }

        .site-logo {
            display: inline-flex;
            width: 72px;
            height: 72px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .site-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .site-placeholder {
            color: #2563eb;
            font-size: 28px;
            font-weight: 700;
        }

        .site-title {
            margin: 0;
            color: #111827;
            font-size: 36px;
            font-weight: 700;
            line-height: 1.25;
        }

        .site-description {
            margin: 16px auto 0;
            max-width: 560px;
            color: #6b7280;
            font-size: 16px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="site">
            <div class="site-logo">
                {notempty name="config.logo"}
                <img src="{$config.logo|htmlentities}" alt="{$config.title|default='VTP'|htmlentities}">
                {else /}
                <span class="site-placeholder">V</span>
                {/notempty}
            </div>
            <h1 class="site-title">{$config.title|default='VTP'|htmlentities}</h1>
            {notempty name="config.seo_description"}
            <p class="site-description">{$config.seo_description|htmlentities}</p>
            {/notempty}
        </section>
    </main>
</body>
</html>
