<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VTP 聊天测试</title>
    {literal}
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: #202124;
            background: #f4f6f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .page {
            width: min(960px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 112px;
            padding: 8px 12px;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #9aa0a6;
        }

        .status.online .dot {
            background: #1f9d55;
        }

        .status.offline .dot {
            background: #d93025;
        }

        .chat {
            overflow: hidden;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            background: #fff;
        }

        .messages {
            height: min(58vh, 520px);
            min-height: 360px;
            overflow-y: auto;
            padding: 18px;
            background: #fbfcfd;
        }

        .message {
            display: grid;
            gap: 6px;
            max-width: 76%;
            margin-bottom: 14px;
        }

        .message.mine {
            margin-left: auto;
            justify-items: end;
        }

        .meta {
            color: #697386;
            font-size: 12px;
        }

        .bubble {
            padding: 10px 12px;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            background: #fff;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .mine .bubble {
            color: #fff;
            border-color: #1769aa;
            background: #1769aa;
        }

        .system {
            margin: 10px 0;
            color: #697386;
            text-align: center;
            font-size: 13px;
        }

        .composer {
            display: grid;
            grid-template-columns: 160px 1fr auto;
            gap: 10px;
            padding: 14px;
            border-top: 1px solid #d8dee4;
            background: #fff;
        }

        input,
        button {
            height: 42px;
            border-radius: 8px;
            font: inherit;
        }

        input {
            width: 100%;
            border: 1px solid #cbd5df;
            padding: 0 12px;
            outline: none;
        }

        input:focus {
            border-color: #1769aa;
            box-shadow: 0 0 0 3px rgba(23, 105, 170, .14);
        }

        button {
            min-width: 88px;
            border: 0;
            color: #fff;
            background: #1769aa;
            cursor: pointer;
        }

        button:disabled {
            background: #9aa0a6;
            cursor: not-allowed;
        }

        @media (max-width: 720px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .composer {
                grid-template-columns: 1fr;
            }

            .message {
                max-width: 92%;
            }
        }
    </style>
    {/literal}
</head>
<body>
<main class="page">
    <div class="topbar">
        <h1>VTP 聊天测试</h1>
        <div id="status" class="status offline">
            <span class="dot"></span>
            <span id="statusText">未连接</span>
        </div>
    </div>

    <section class="chat">
        <div id="messages" class="messages"></div>
        <form id="form" class="composer">
            <input id="name" maxlength="20" autocomplete="nickname" placeholder="昵称">
            <input id="message" maxlength="500" autocomplete="off" placeholder="输入消息">
            <button id="send" type="submit" disabled>发送</button>
        </form>
    </section>
</main>

{literal}
<script>
    const wsUrl = `ws://${location.hostname || '127.0.0.1'}:2346`;
    const statusEl = document.querySelector('#status');
    const statusText = document.querySelector('#statusText');
    const messagesEl = document.querySelector('#messages');
    const form = document.querySelector('#form');
    const nameInput = document.querySelector('#name');
    const messageInput = document.querySelector('#message');
    const sendButton = document.querySelector('#send');

    let socket = null;
    let clientId = '';

    nameInput.value = localStorage.getItem('chat_name') || `游客${Math.floor(Math.random() * 900 + 100)}`;

    function setStatus(text, online) {
        statusText.textContent = text;
        statusEl.classList.toggle('online', online);
        statusEl.classList.toggle('offline', !online);
        sendButton.disabled = !online;
    }

    function appendSystem(text) {
        const node = document.createElement('div');
        node.className = 'system';
        node.textContent = text;
        messagesEl.appendChild(node);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(data) {
        const item = document.createElement('div');
        item.className = `message ${data.client_id === clientId ? 'mine' : ''}`;

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = `${data.name || '游客'} · ${data.time || ''}`;

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = data.message || '';

        item.append(meta, bubble);
        messagesEl.appendChild(item);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function connect() {
        socket = new WebSocket(wsUrl);
        setStatus('连接中', false);

        socket.addEventListener('open', () => {
            setStatus('已连接', true);
            appendSystem(`已连接 ${wsUrl}`);
        });

        socket.addEventListener('message', (event) => {
            let data = {};

            try {
                data = JSON.parse(event.data);
            } catch (error) {
                data = {type: 'message', name: '服务端', message: event.data};
            }

            if (data.type === 'connect') {
                clientId = data.client_id;
                appendSystem(`你的连接 ID：${clientId}`);
                return;
            }

            if (data.type === 'close') {
                appendSystem(`${data.client_id} 已离开`);
                return;
            }

            appendMessage(data);
        });

        socket.addEventListener('close', () => {
            setStatus('已断开', false);
            appendSystem('连接已断开，3 秒后重连');
            setTimeout(connect, 3000);
        });

        socket.addEventListener('error', () => {
            setStatus('连接错误', false);
        });
    }

    form.addEventListener('submit', (event) => {
        event.preventDefault();

        const message = messageInput.value.trim();
        const name = nameInput.value.trim() || '游客';

        if (!message || !socket || socket.readyState !== WebSocket.OPEN) {
            return;
        }

        localStorage.setItem('chat_name', name);
        socket.send(JSON.stringify({name, message}));
        messageInput.value = '';
        messageInput.focus();
    });

    connect();
</script>
{/literal}
</body>
</html>
